# Project name + container_name => always the same two containers (no random dockercompose123… names).
# Stop: docker compose down   (from this folder)
# Render is unaffected (compose is local only).
name: maarif

services:
  web:
    container_name: maarif-web
    build:
      context: .
      dockerfile: Presentation/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      # Hostname "sql-server" is the Compose service name (same Docker network).
      ConnectionStrings__cString: "Server=sql-server,1433;Database=MaarifDb;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=True;Encrypt=False;MultipleActiveResultSets=True"
    depends_on:
      sql-server:
        condition: service_healthy

  sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sql_server_container
    ports:
      - "1444:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Password123"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"YourStrong@Password123\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

volumes:
  sqlserver_data: