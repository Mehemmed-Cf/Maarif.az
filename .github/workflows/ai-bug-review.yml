name: AI Bug Review

on:
  push:
    branches: [main]

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get diff
        run: |
          git diff HEAD~1 HEAD > diff.txt

      - name: Run AI review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: python  # <--- Bura diqqət! Python-u birbaşa shell kimi çağırırıq
        run: |
          import os
          import requests
          import sys

          # Faylı oxuyuruq
          try:
              if not os.path.exists("diff.txt"):
                  print("Diff faylı tapılmadı.")
                  sys.exit(0)

              with open("diff.txt", "r") as f:
                  diff = f.read()

              if not diff.strip():
                  print("Heç bir dəyişiklik yoxdur.")
                  sys.exit(0)

              prompt = f"You are a senior engineer. Review this git diff and find ONLY real bugs. Max 5 issues. If nothing critical: say 'No critical issues found'.\n\nDiff:\n{diff[:12000]}"

              response = requests.post(
                  "https://api.openai.com/v1/chat/completions",
                  headers={
                      "Authorization": f"Bearer {os.environ['OPENAI_API_KEY']}",
                      "Content-Type": "application/json"
                  },
                  json={
                      "model": "gpt-4o-mini",
                      "messages": [
                          {"role": "system", "content": "You are a strict senior code reviewer."},
                          {"role": "user", "content": prompt}
                      ],
                      "temperature": 0.2
                  }
              )

              res_data = response.json()
              if "choices" in res_data:
                  print("\n=== AI REVIEW ===\n")
                  print(res_data["choices"][0]["message"]["content"])
              else:
                  print("API Xətası:", res_data)

          except Exception as e:
              print(f"Sistem xətası: {e}")
              sys.exit(1)